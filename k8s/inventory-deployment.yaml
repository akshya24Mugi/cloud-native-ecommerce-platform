apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template: 
    metadata:
      labels:
        app: inventory-service


    spec:
      containers:
      - name: inventory-service
        image: akshaya1234/inventory-service:v1
        imagePullPolicy: Always

        ports:
          - containerPort: 5600

        env:
        - name: DATABASE_URL
          value: postgresql://postgres:akshay1234@postgres:5432/inventory_db

