version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: akshay1234

    ports:
      - "5432:5432" 

    volumes:
      - postgres-data:/var/lib/postgresql/data



  user-service:
    build: ./user-service
    container_name: user_service

    ports:
      - "5400:5400"

    environment:
      DATABASE_URL: postgresql://postgres:akshay1234@postgres:5432/users_db
      SECRET_KEY: mysecretkey
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    depends_on:
      - postgres


  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5500:5500"
    environment:
      DATABASE_URL: postgresql://postgres:akshay1234@postgres:5432/products_db

    depends_on:
      - postgres

  inventory-service:
    build: ./inventory-service

    container_name: inventory-service

    ports:
      - "5600:5600"

    environment:
      DATABASE_URL: postgresql://postgres:akshay1234@postgres:5432/inventory_db 

    depends_on:
      - postgres

  order-service:
    build: ./order-service

    container_name: order-service

    ports:
     - "5700:5700"

    environment:
      DATABASE_URL: postgresql://postgres:akshay1234@postgres:5432/orders_db 

    depends_on:
      - postgres

      
  payment-service:
    build: ./payment-service

    container_name: payment-service

    ports:
      - "5800:5800"

    environment:
      DATABASE_URL: postgresql://postgres:akshay1234@postgres:5432/payments_db  

    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - user-service
      - product-service
      - inventory-service
      - order-service
      - payment-service

  grafana:

    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus
      
        

volumes:
  postgres-data:


